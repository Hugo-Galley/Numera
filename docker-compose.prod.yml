services:
  backend:
    build:
      context: ./backend
    container_name: suivi-budget-backend-prod
    environment:
      - APP_ENV=prod
      - DATABASE_URL=sqlite:////app/data/suivi_budget.db
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8001:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  backup:
    build:
      context: ./backend
    container_name: suivi-budget-backup-prod
    environment:
      - DB_PATH=/app/data/suivi_budget.db
      - BACKUP_DIR=/app/backups
      - BACKUP_KEY=${BACKUP_KEY}
      - BACKUP_INTERVAL_SECONDS=86400 # 24h
    volumes:
      - ./backend/data:/app/data
      - ./backups:/app/backups
    depends_on:
      backend:
        condition: service_healthy
    command: python scripts/backup_scheduler.py
    restart: always

  mcp-server:
    build:
      context: ./mcp-server
    container_name: suivi-budget-mcp-prod
    environment:
      - MCP_DB_PATH=/data/suivi_budget.db
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8100
    volumes:
      - ./backend/data:/data
    ports:
      - "8100:8100"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: suivi-budget-frontend-prod
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always
